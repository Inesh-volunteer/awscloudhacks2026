AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AutoRedTeam — S3 artifact bucket, DynamoDB tables, and EventBridge Scheduler.

Parameters:
  Env:
    Type: String
    Default: dev
  ScheduleExpression:
    Type: String
    Default: "rate(5 minutes)"
  OrchestratorStateMachineArn:
    Type: String
    Description: ARN of the Main Orchestrator Step Functions state machine

Resources:

  # ---------------------------------------------------------------------------
  # S3 Artifact Bucket (versioning enabled — Property 10.4)
  # ---------------------------------------------------------------------------
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "autoredteam-${Env}-artifacts-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Env

  # ---------------------------------------------------------------------------
  # DynamoDB: ObjectiveLanes table
  # ---------------------------------------------------------------------------
  ObjectiveLanesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "autoredteam-${Env}-ObjectiveLanes"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: lane_id
          AttributeType: S
      KeySchema:
        - AttributeName: lane_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Env

  # ---------------------------------------------------------------------------
  # DynamoDB: Runs table
  # ---------------------------------------------------------------------------
  RunsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "autoredteam-${Env}-Runs"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: run_id
          AttributeType: S
      KeySchema:
        - AttributeName: run_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Env

  # ---------------------------------------------------------------------------
  # EventBridge Scheduler role
  # ---------------------------------------------------------------------------
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "autoredteam-${Env}-scheduler-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartStepFunctions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: states:StartExecution
                Resource: !Ref OrchestratorStateMachineArn

  # ---------------------------------------------------------------------------
  # EventBridge Scheduler
  # ---------------------------------------------------------------------------
  ResearchSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "autoredteam-${Env}-research-schedule"
      ScheduleExpression: !Ref ScheduleExpression
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !Ref OrchestratorStateMachineArn
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: !Sub |
          {
            "env": "${Env}"
          }
      State: ENABLED

Outputs:
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
    Export:
      Name: !Sub "autoredteam-${Env}-ArtifactBucketName"

  ObjectiveLanesTableName:
    Value: !Ref ObjectiveLanesTable
    Export:
      Name: !Sub "autoredteam-${Env}-ObjectiveLanesTableName"

  RunsTableName:
    Value: !Ref RunsTable
    Export:
      Name: !Sub "autoredteam-${Env}-RunsTableName"
